name: Deploy to Koyeb

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: koyeb-prod
      cancel-in-progress: true

    env:
      KOYEB_APP_NAME: ${{ vars.KOYEB_APP_NAME || 'krishisetu-app' }}
      KOYEB_SERVICE_NAME: ${{ vars.KOYEB_SERVICE_NAME || 'krishisetu-api' }}
      KOYEB_REGION: ${{ vars.KOYEB_REGION || 'fra' }}
      KOYEB_INSTANCE_TYPE: ${{ vars.KOYEB_INSTANCE_TYPE || 'nano' }}

    steps:
      - name: Install and configure Koyeb CLI
      uses: koyeb-community/koyeb-actions@v2
      with:
        api_token: ${{ secrets.KOYEB_API_TOKEN }}

      - name: Sync Koyeb secret DB_URL
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: DB_URL
          secret-value: ${{ secrets.DB_URL }}

      - name: Sync Koyeb secret DB_USERNAME
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: DB_USERNAME
          secret-value: ${{ secrets.DB_USERNAME }}

      - name: Sync Koyeb secret DB_PASSWORD
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: DB_PASSWORD
          secret-value: ${{ secrets.DB_PASSWORD }}

      - name: Sync Koyeb secret JWT_SECRET
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: JWT_SECRET
          secret-value: ${{ secrets.JWT_SECRET }}

      - name: Sync Koyeb secret APP_BACKEND_BASE_URL
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: APP_BACKEND_BASE_URL
          secret-value: ${{ secrets.APP_BACKEND_BASE_URL }}

      - name: Sync Koyeb secret APP_FRONTEND_RESET_PASSWORD_URL
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: APP_FRONTEND_RESET_PASSWORD_URL
          secret-value: ${{ secrets.APP_FRONTEND_RESET_PASSWORD_URL }}

      - name: Sync Koyeb secret MAIL_HOST
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: MAIL_HOST
          secret-value: ${{ secrets.MAIL_HOST }}

      - name: Sync Koyeb secret MAIL_PORT
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: MAIL_PORT
          secret-value: ${{ secrets.MAIL_PORT }}

      - name: Sync Koyeb secret MAIL_USERNAME
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: MAIL_USERNAME
          secret-value: ${{ secrets.MAIL_USERNAME }}

      - name: Sync Koyeb secret MAIL_PASSWORD
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: MAIL_PASSWORD
          secret-value: ${{ secrets.MAIL_PASSWORD }}

      - name: Sync Koyeb secret KAFKA_BOOTSTRAP_SERVERS
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: KAFKA_BOOTSTRAP_SERVERS
          secret-value: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}

      - name: Sync Koyeb secret KAFKA_SECURITY_PROTOCOL
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: KAFKA_SECURITY_PROTOCOL
          secret-value: ${{ secrets.KAFKA_SECURITY_PROTOCOL }}

      - name: Sync Koyeb secret KAFKA_SASL_MECHANISM
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: KAFKA_SASL_MECHANISM
          secret-value: ${{ secrets.KAFKA_SASL_MECHANISM }}

      - name: Sync Koyeb secret KAFKA_SASL_JAAS_CONFIG
        uses: koyeb/action-git-deploy/secret@v1
        with:
          secret-name: KAFKA_SASL_JAAS_CONFIG
          secret-value: ${{ secrets.KAFKA_SASL_JAAS_CONFIG }}

      - name: Build and deploy to Koyeb
        uses: koyeb/action-git-deploy@v1
        with:
          app-name: ${{ env.KOYEB_APP_NAME }}
          service-name: ${{ env.KOYEB_SERVICE_NAME }}
          service-type: web
          service-instance-type: ${{ env.KOYEB_INSTANCE_TYPE }}
          service-regions: ${{ env.KOYEB_REGION }}
          service-ports: "8080:http"
          service-routes: "/:8080"
          service-checks: "8080:http:/actuator/health"
          service-env: "SPRING_PROFILES_ACTIVE=prod,PORT=8080,DB_URL=@DB_URL,DB_USERNAME=@DB_USERNAME,DB_PASSWORD=@DB_PASSWORD,JWT_SECRET=@JWT_SECRET,APP_BACKEND_BASE_URL=@APP_BACKEND_BASE_URL,APP_FRONTEND_RESET_PASSWORD_URL=@APP_FRONTEND_RESET_PASSWORD_URL,MAIL_HOST=@MAIL_HOST,MAIL_PORT=@MAIL_PORT,MAIL_USERNAME=@MAIL_USERNAME,MAIL_PASSWORD=@MAIL_PASSWORD,KAFKA_BOOTSTRAP_SERVERS=@KAFKA_BOOTSTRAP_SERVERS,KAFKA_SECURITY_PROTOCOL=@KAFKA_SECURITY_PROTOCOL,KAFKA_SASL_MECHANISM=@KAFKA_SASL_MECHANISM,KAFKA_SASL_JAAS_CONFIG=@KAFKA_SASL_JAAS_CONFIG"
